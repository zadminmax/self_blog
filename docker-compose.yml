services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: selfblog
      POSTGRES_PASSWORD: selfblog
      POSTGRES_DB: selfblog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfblog -d selfblog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      USE_SQLITE: "false"
      DATABASE_URL: postgres://selfblog:selfblog@postgres:5432/selfblog?sslmode=disable
      JWT_SECRET: docker-dev-change-me
      PUBLIC_URL: http://localhost:8080
      UPLOAD_DIR: /app/data/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      ADMIN_SEED_USER: admin
      ADMIN_SEED_PASSWORD: admin123
    volumes:
      - api_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  api_uploads:
