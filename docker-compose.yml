services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: selfblog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-selfblog}
      POSTGRES_DB: selfblog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfblog -d selfblog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # 左侧为宿主机端口。若本机正在 `go run ./cmd/api` 且监听 8080，则宿主机 8080 会先到本机进程而非容器，
    # 表现为容器里 curl 正常、宿主机 curl 404/旧路由。请先结束本机 api，或改为 "18080:8080" 并用该端口访问 API。
    ports:
      - "8080:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: ":8080"
      USE_SQLITE: "false"
      DATABASE_URL: postgres://selfblog:${POSTGRES_PASSWORD:-selfblog}@postgres:5432/selfblog?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-docker-dev-change-me}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:8080}
      UPLOAD_DIR: /app/data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ADMIN_SEED_USER: ${ADMIN_SEED_USER:-admin}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-admin123}
    volumes:
      - api_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  api_uploads:
