# HTTPS：Nginx 终止 TLS；配置由 deploy/selfblog.sh nginx-gen 写入 deploy/nginx/generated/
#   USE_HTTPS=1 ./deploy/selfblog.sh release
# 首次证书：./deploy/selfblog.sh first-cert
# 续期：./deploy/selfblog.sh renew-certs

volumes:
  certbot-www:
  certbot-conf:

services:
  api:
    # 公网只走 80/443，不暴露 8080
    ports: []

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/generated:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_started

  # 仅用于 `docker compose --profile cert run --rm certbot ...`，不会被 `up -d` 拉起
  certbot:
    image: certbot/certbot
    profiles:
      - cert
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
