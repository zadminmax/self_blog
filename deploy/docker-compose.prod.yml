# 生产 compose 放在 deploy/ 下时，务必带 --project-directory=<仓库根> 执行（见 deploy/up.sh），否则 build context 会错成 deploy/。
# 服务器需先有 deploy/artifacts 与根目录 .env
name: selfblog

volumes:
  pgdata:
  api_uploads:
  certbot-www:
  certbot-conf:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: selfblog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: selfblog
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U selfblog -d selfblog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      USE_SQLITE: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: selfblog
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: selfblog
      DB_SSLMODE: disable
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}
      UPLOAD_DIR: /app/data/uploads
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_SEED_USER: ${ADMIN_SEED_USER:-admin}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-admin123}
    volumes:
      - api_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: deploy/Dockerfile.admin
    restart: unless-stopped
    expose:
      - "80"

  web:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    restart: unless-stopped
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/generated:/etc/nginx/conf.d:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - admin
      - web

  certbot:
    image: certbot/certbot
    profiles: [cert]
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
