# 与 https + cloud 一起使用；WITH_SITES=1 且 SITE_ADMIN_HOST 非空时由 selfblog.sh release 追加。
services:
  admin-site:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${PUBLIC_URL}
    restart: unless-stopped
    expose:
      - "80"

  nginx:
    depends_on:
      admin-site:
        condition: service_started
